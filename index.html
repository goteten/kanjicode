<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>漢字コードゲーム</title>
  <style>
    :root {
      color-scheme: light;
      --paper: #fbfaf6;
      --ink: #1c2530;
      --muted: #647181;
      --line: #d8d6ca;
      --coral: #ef8b75;
      --yellow: #f2c94c;
      --white: #ffffff;
      --shadow: 0 18px 55px rgba(31, 45, 61, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      background:
        linear-gradient(135deg, rgba(141, 215, 192, 0.25), transparent 34%),
        linear-gradient(315deg, rgba(239, 139, 117, 0.2), transparent 38%),
        var(--paper);
      color: var(--ink);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(980px, 100%);
      display: grid;
      gap: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.2rem, 6vw, 5rem);
      line-height: 0.95;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 1rem;
    }

    .game {
      background: rgba(255, 255, 255, 0.84);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: clamp(18px, 4vw, 34px);
      display: grid;
      gap: 22px;
    }

    .mode-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .mode-button {
      min-height: 48px;
      border: 1px solid var(--line);
      background: var(--white);
      color: var(--ink);
      border-radius: 8px;
      padding: 8px 10px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      white-space: normal;
    }

    .mode-button[aria-pressed="true"] {
      background: var(--ink);
      border-color: var(--ink);
      color: var(--white);
    }

    .mode-info {
      margin: -10px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: clamp(10px, 2vw, 18px);
      min-height: 230px;
    }

    .moji-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--white);
      display: grid;
      grid-template-rows: auto 1fr auto;
      align-items: center;
      justify-items: center;
      padding: 14px;
      overflow: hidden;
    }

    .moji-card.middle {
      background: #fff7dd;
      border-color: #d4aa31;
    }

    .label {
      width: 100%;
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 700;
    }

    .char {
      width: 100%;
      min-height: 128px;
      display: grid;
      place-items: center;
      font-size: clamp(4rem, 13vw, 8rem);
      line-height: 1;
      font-family: "Yu Mincho", "Hiragino Mincho ProN", "MS Mincho", serif;
    }

    .code {
      color: var(--muted);
      font-family: Consolas, "Courier New", monospace;
      font-size: clamp(0.82rem, 2vw, 1rem);
      overflow-wrap: anywhere;
    }

    .answer-panel {
      min-height: 58px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f7fbff;
      color: var(--ink);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .answer-text {
      margin: 0;
      color: var(--muted);
      font-weight: 650;
    }

    .answer-text strong {
      color: var(--ink);
      font-size: 1.25rem;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      align-items: center;
    }

    button.action {
      min-height: 52px;
      border: 0;
      border-radius: 8px;
      padding: 0 16px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
    }

    button.primary {
      background: var(--coral);
      color: var(--white);
    }

    button.secondary {
      background: var(--ink);
      color: var(--white);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.42;
    }

    .hint {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px;
      align-items: start;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .hint b {
      color: var(--ink);
    }

    .chip {
      display: inline-grid;
      place-items: center;
      min-width: 30px;
      height: 30px;
      border-radius: 8px;
      background: var(--yellow);
      color: var(--ink);
      font-weight: 900;
    }

    @media (max-width: 780px) {
      .mode-row {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 680px) {
      body {
        padding: 14px;
      }

      .cards,
      .controls,
      .mode-row {
        grid-template-columns: 1fr;
      }

      .moji-card {
        min-height: 160px;
      }

      button.action {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>漢字コードゲーム</h1>
      <p class="subtitle">Unicodeのひとつ前とひとつ後から、真ん中の漢字を予想するゲームです。</p>
    </header>

    <section class="game" aria-label="漢字Unicode文字当てゲーム">
      <div class="mode-row" aria-label="出題モード">
        <button class="mode-button" type="button" data-mode="joyo" aria-pressed="true">常用漢字</button>
        <button class="mode-button" type="button" data-mode="jisLevel1" aria-pressed="false">JIS第一水準</button>
        <button class="mode-button" type="button" data-mode="jisLevel12" aria-pressed="false">JIS第一・第二水準</button>
        <button class="mode-button" type="button" data-mode="all" aria-pressed="false">すべての漢字</button>
      </div>
      <p class="mode-info" id="modeInfo"></p>

      <div class="cards">
        <article class="moji-card">
          <div class="label">ひとつ前</div>
          <div class="char" id="prevChar">上</div>
          <div class="code" id="prevCode">U+4E0A</div>
        </article>

        <article class="moji-card middle">
          <div class="label">真ん中</div>
          <div class="char" id="middleChar">?</div>
          <div class="code" id="middleCode">U+????</div>
        </article>

        <article class="moji-card">
          <div class="label">ひとつ後</div>
          <div class="char" id="nextChar">下</div>
          <div class="code" id="nextCode">U+4E0B</div>
        </article>
      </div>

      <div class="answer-panel" aria-live="polite">
        <p class="answer-text" id="message">真ん中の漢字を思いついたら、答えを見てください。</p>
      </div>

      <div class="controls">
        <button class="action primary" type="button" id="answerButton">答えを見る</button>
        <button class="action secondary" type="button" id="nextButton" disabled>次の問題</button>
      </div>

      <div class="hint">
        <span class="chip">?</span>
        <span><b>ヒント:</b> 前のUnicode番号に1を足すと、真ん中の漢字の番号になります。</span>
      </div>
    </section>
  </main>

  <script src="kanji-data.js"></script>
  <script>
    const prevChar = document.querySelector("#prevChar");
    const middleChar = document.querySelector("#middleChar");
    const nextChar = document.querySelector("#nextChar");
    const prevCode = document.querySelector("#prevCode");
    const middleCode = document.querySelector("#middleCode");
    const nextCode = document.querySelector("#nextCode");
    const message = document.querySelector("#message");
    const modeInfo = document.querySelector("#modeInfo");
    const answerButton = document.querySelector("#answerButton");
    const nextButton = document.querySelector("#nextButton");
    const modeButtons = document.querySelectorAll(".mode-button");

    const allKanji = makeRange(0x3400, 0x4DBF).concat(makeRange(0x4E00, 0x9FFF));
    const modes = {
      joyo: {
        label: "常用漢字",
        note: "常用漢字表の2136字から出題します。",
        chars: uniqueChars(JOYO_KANJI)
      },
      jisLevel1: {
        label: "JIS第一水準",
        note: "常用漢字とJIS第一水準の漢字を候補にします。",
        chars: uniqueChars(JOYO_KANJI + JIS_LEVEL_1_KANJI)
      },
      jisLevel12: {
        label: "JIS第一・第二水準",
        note: "常用漢字とJIS第一・第二水準の漢字を候補にします。",
        chars: uniqueChars(JOYO_KANJI + JIS_LEVEL_1_KANJI + JIS_LEVEL_2_KANJI)
      },
      all: {
        label: "すべての漢字",
        note: "UnicodeのCJK統合漢字と拡張Aを候補にします。",
        chars: allKanji
      }
    };

    let activeMode = "joyo";
    let answerCode = 0x4E0A;
    let answered = false;

    function uniqueChars(text) {
      return Array.from(new Set(Array.from(text)));
    }

    function makeRange(start, end) {
      const chars = [];
      for (let code = start; code <= end; code += 1) {
        chars.push(String.fromCodePoint(code));
      }
      return chars;
    }

    function toChar(codePoint) {
      return String.fromCodePoint(codePoint);
    }

    function toCodeLabel(codePoint) {
      return "U+" + codePoint.toString(16).toUpperCase().padStart(4, "0");
    }

    function randomAnswerCode() {
      const candidates = modes[activeMode].chars;
      const answer = candidates[Math.floor(Math.random() * candidates.length)];
      return answer.codePointAt(0);
    }

    function updateModeInfo() {
      const mode = modes[activeMode];
      modeInfo.textContent = `${mode.label}: ${mode.chars.length.toLocaleString("ja-JP")}字。${mode.note}`;
    }

    function showHiddenQuestion() {
      prevChar.textContent = toChar(answerCode - 1);
      nextChar.textContent = toChar(answerCode + 1);
      middleChar.textContent = "?";
      prevCode.textContent = toCodeLabel(answerCode - 1);
      nextCode.textContent = toCodeLabel(answerCode + 1);
      middleCode.textContent = "U+????";
      message.textContent = "真ん中の漢字を思いついたら、答えを見てください。";
      answerButton.disabled = false;
      nextButton.disabled = true;
      answered = false;
      updateModeInfo();
    }

    function newQuestion() {
      answerCode = randomAnswerCode();
      showHiddenQuestion();
    }

    function revealAnswer() {
      const answer = toChar(answerCode);
      middleChar.textContent = answer;
      middleCode.textContent = toCodeLabel(answerCode);
      message.innerHTML = `<strong>答え:</strong> ${answer} (${toCodeLabel(answerCode)}) です。`;
      answerButton.disabled = true;
      nextButton.disabled = false;
      answered = true;
    }

    modeButtons.forEach((button) => {
      button.addEventListener("click", () => {
        activeMode = button.dataset.mode;
        modeButtons.forEach((item) => {
          item.setAttribute("aria-pressed", String(item === button));
        });
        newQuestion();
      });
    });

    answerButton.addEventListener("click", revealAnswer);
    nextButton.addEventListener("click", () => {
      if (answered) {
        newQuestion();
      }
    });

    newQuestion();
  </script>
</body>
</html>
