<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Unicode Word Shift</title>
  <style>
    :root {
      color-scheme: light;
      --paper: #fbfaf6;
      --ink: #1d2630;
      --muted: #657385;
      --line: #d8d6ca;
      --mint: #69d2c0;
      --coral: #ef8b75;
      --yellow: #f2c94c;
      --blue: #405b8f;
      --white: #ffffff;
      --shadow: 0 18px 55px rgba(31, 45, 61, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      background:
        linear-gradient(135deg, rgba(105, 210, 192, 0.26), transparent 34%),
        linear-gradient(315deg, rgba(239, 139, 117, 0.19), transparent 38%),
        var(--paper);
      color: var(--ink);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(1040px, 100%);
      display: grid;
      gap: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.1rem, 6vw, 4.8rem);
      line-height: 0.96;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 1rem;
    }

    .game {
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: clamp(18px, 4vw, 34px);
      display: grid;
      gap: 20px;
    }

    [hidden] {
      display: none !important;
    }

    .mode-tabs {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .mode-button {
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--white);
      color: var(--ink);
      font: inherit;
      font-weight: 850;
      cursor: pointer;
    }

    .mode-button[aria-pressed="true"] {
      background: var(--ink);
      border-color: var(--ink);
      color: var(--white);
    }

    .question-top {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
    }

    .round-label {
      color: var(--muted);
      font-weight: 800;
      font-size: 0.95rem;
    }

    .length-badge {
      justify-self: end;
      min-height: 34px;
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff7dd;
      padding: 6px 10px;
      color: var(--ink);
      font-weight: 850;
      white-space: nowrap;
    }

    .custom-panel {
      display: grid;
      gap: 8px;
    }

    .custom-label {
      color: var(--muted);
      font-weight: 800;
      font-size: 0.95rem;
    }

    textarea {
      width: 100%;
      min-height: 94px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--white);
      color: var(--ink);
      padding: 12px;
      font: inherit;
      font-size: 1.15rem;
      line-height: 1.45;
    }

    textarea:focus {
      outline: 3px solid rgba(105, 210, 192, 0.42);
      outline-offset: 2px;
    }

    .custom-controls {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
    }

    .custom-status {
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 700;
    }

    .shift-stack {
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(105, 210, 192, 0.12), transparent 42%),
        linear-gradient(0deg, rgba(239, 139, 117, 0.12), transparent 42%),
        var(--white);
      display: grid;
      overflow: hidden;
    }

    .shift-row {
      min-height: 72px;
      border-bottom: 1px solid rgba(216, 214, 202, 0.72);
      padding: 8px clamp(10px, 2vw, 18px);
      display: grid;
      grid-template-columns: 58px minmax(0, 1fr);
      gap: 12px;
      align-items: center;
      opacity: calc(1 - (var(--distance) - 1) * 0.16);
      overflow: hidden;
    }

    .shift-row:last-child {
      border-bottom: 0;
    }

    .shift-row.negative {
      color: #226f66;
    }

    .shift-row.positive {
      color: #9f4f42;
    }

    .shift-row.center {
      min-height: 92px;
      background:
        linear-gradient(90deg, rgba(242, 201, 76, 0.24), transparent 34%, transparent 66%, rgba(242, 201, 76, 0.18));
      color: var(--ink);
      opacity: 1;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.8),
        inset 0 -1px 0 rgba(255, 255, 255, 0.8);
    }

    .shift-label {
      color: currentColor;
      font-family: Consolas, "Courier New", monospace;
      font-weight: 900;
      font-size: clamp(0.9rem, 2vw, 1rem);
      text-align: right;
    }

    .shift-word {
      display: grid;
      align-items: center;
      min-width: 0;
      overflow-wrap: anywhere;
      word-break: break-all;
      font-size: clamp(1.45rem, 4vw, 2.45rem);
      line-height: 1.08;
      font-weight: 900;
    }

    .answer-panel {
      min-height: 72px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f7fbff;
      display: grid;
      align-items: center;
      padding: 14px;
    }

    .answer-text {
      margin: 0;
      color: var(--muted);
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .answer-text strong {
      color: var(--ink);
      font-size: clamp(1.45rem, 4vw, 2.4rem);
      line-height: 1.12;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      align-items: center;
    }

    button.action {
      min-height: 52px;
      border: 0;
      border-radius: 8px;
      padding: 0 16px;
      font: inherit;
      font-weight: 850;
      cursor: pointer;
      white-space: nowrap;
    }

    button.primary {
      background: var(--coral);
      color: var(--white);
    }

    button.secondary {
      background: var(--ink);
      color: var(--white);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.42;
    }

    .note {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px;
      align-items: start;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .chip {
      display: inline-grid;
      place-items: center;
      min-width: 30px;
      height: 30px;
      border-radius: 8px;
      background: var(--yellow);
      color: var(--ink);
      font-weight: 900;
      font-family: Consolas, "Courier New", monospace;
    }

    @media (max-width: 620px) {
      body {
        padding: 14px;
      }

      .question-top,
      .custom-controls,
      .controls,
      .mode-tabs {
        grid-template-columns: 1fr;
      }

      .length-badge {
        justify-self: start;
      }

      .shift-row {
        min-height: 62px;
        grid-template-columns: 46px minmax(0, 1fr);
      }

      button.action {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Unicode Word Shift</h1>
      <p class="subtitle">文字コードを少しずつずらした言葉から、元の単語を当てるゲームです。</p>
    </header>

    <section class="game" aria-label="Unicode文字コードずらし単語クイズ">
      <div class="mode-tabs" aria-label="出題モード">
        <button class="mode-button" type="button" data-mode="quiz" aria-pressed="true">問題モード</button>
        <button class="mode-button" type="button" data-mode="custom" aria-pressed="false">入力モード</button>
      </div>

      <div class="question-top">
        <div class="round-label" id="roundLabel">問題 1</div>
        <div class="length-badge" id="lengthBadge">3文字</div>
      </div>

      <div class="custom-panel" id="customPanel" hidden>
        <label class="custom-label" for="customInput">ずらして表示する文字列</label>
        <textarea id="customInput" maxlength="40" spellcheck="false">漢字迷宮</textarea>
        <div class="custom-controls">
          <span class="custom-status" id="customStatus">中央の答えを表示中</span>
          <button class="action secondary" type="button" id="customHideButton">答えを隠す</button>
        </div>
      </div>

      <div class="shift-stack" id="shiftStack" aria-label="文字コードをずらした単語一覧"></div>

      <div class="answer-panel" aria-live="polite">
        <p class="answer-text" id="message">ずらされる前の言葉を想像してから、答えを表示してください。</p>
      </div>

      <div class="controls">
        <button class="action primary" type="button" id="answerButton">答えを表示</button>
        <button class="action secondary" type="button" id="nextButton" disabled>次の問題</button>
        <button class="action secondary" type="button" id="copyButton">9行をコピー</button>
      </div>

      <div class="note">
        <span class="chip">+1</span>
        <span>各文字のUnicodeコードポイントを同じ数だけ動かしています。たとえば答えが bee なら、-1 で add、+1 で cff になります。</span>
      </div>
    </section>
  </main>

      "路地裏", "横丁", "石段", "古井戸", "井戸端", "辻占", "高札場", "番傘", "雨合羽", "旅籠",
      "龍笛", "琵琶", "三味線", "琴柱", "尺八", "拍子木", "木魚", "銅鑼", "鼓笛隊", "雅楽",
      "能面", "歌舞伎", "見得", "花道", "寄席", "落語", "講談", "紙芝居", "狂言", "人形浄瑠璃",
      "朱雀門", "玄武岩", "青龍刀", "白虎隊", "麒麟児", "鳳凰堂", "龍宮城", "蓬莱山", "桃源郷", "極楽鳥",
      "影法師", "狐火", "鬼灯", "夜光虫", "夢見鳥", "鵺", "河童巻き", "天狗面", "座敷牢", "迷子札",
      "コンビニ", "カステラ", "ラーメン", "チョコレート", "サンドイッチ", "エレベーター", "パスポート", "キーボード", "アルバム", "バスケット",
      "オルゴール", "カレンダー", "スニーカー", "トンネル", "ハンカチ", "ピアノ", "マラソン", "メロディ", "ロケット", "カプセル",
      "penguin", "notebook", "sunflower", "keyboard", "triangle", "umbrella", "calendar", "sandwich", "harmony", "library",
      "festival", "diamond", "morning", "evening", "rainbow", "station", "picture", "battery", "journey", "whisper",
      "mirror", "garden", "rocket", "planet", "puzzle", "cookie", "orange", "violet", "silver", "button"
    ];

    const shifts = [-4, -3, -2, -1, 1, 2, 3, 4];
    const quizWords = words.filter((word) => {
      const length = Array.from(word).length;
      return length >= 3 && length <= 20;
    });
    const shiftStack = document.querySelector("#shiftStack");
    const roundLabel = document.querySelector("#roundLabel");
    const lengthBadge = document.querySelector("#lengthBadge");
    const customPanel = document.querySelector("#customPanel");
    const customInput = document.querySelector("#customInput");
    const customStatus = document.querySelector("#customStatus");
    const customHideButton = document.querySelector("#customHideButton");
    const message = document.querySelector("#message");
    const answerButton = document.querySelector("#answerButton");
    const nextButton = document.querySelector("#nextButton");
    const copyButton = document.querySelector("#copyButton");
    const modeButtons = document.querySelectorAll(".mode-button");

    let activeMode = "quiz";
    let round = 0;
    let answer = "";
    let previousAnswer = "";
    let answered = false;
    let customAnswerHidden = false;
    let currentRows = [];

    function pickWord() {
      let picked = quizWords[Math.floor(Math.random() * quizWords.length)];
      while (quizWords.length > 1 && picked === previousAnswer) {
        picked = quizWords[Math.floor(Math.random() * quizWords.length)];
      }
      previousAnswer = picked;
      return picked;
    }

    function shiftWord(word, amount) {
      return Array.from(word, (char) => {
        const shifted = char.codePointAt(0) + amount;
        return String.fromCodePoint(Math.max(1, shifted));
      }).join("");
    }

    function hiddenWord(word) {
      return Array.from(word, (char) => char.trim() ? "？" : char).join("");
    }

    function createShiftRow(amount, word, rowType) {
      const row = document.createElement("article");
      const distance = amount === 0 ? 1 : Math.abs(amount);
      row.className = `shift-row ${rowType}`;
      row.style.setProperty("--distance", String(distance));

      const label = document.createElement("div");
      label.className = "shift-label";
      label.textContent = amount > 0 ? `+${amount}` : amount < 0 ? String(amount) : "???";

      const wordEl = document.createElement("div");
      wordEl.className = "shift-word";
      wordEl.textContent = word;

      row.append(label, wordEl);
      return row;
    }

    function renderShiftRows(sourceText, centerText) {
      const negativeRows = [-4, -3, -2, -1].map((amount) => (
        createShiftRow(amount, shiftWord(sourceText, amount), "negative")
      ));
      const positiveRows = [1, 2, 3, 4].map((amount) => (
        createShiftRow(amount, shiftWord(sourceText, amount), "positive")
      ));
      const centerRow = createShiftRow(0, centerText, "center");
      shiftStack.replaceChildren(...negativeRows, centerRow, ...positiveRows);
      currentRows = [
        ...[-4, -3, -2, -1].map((amount) => [amount, shiftWord(sourceText, amount)]),
        [0, centerText],
        ...[1, 2, 3, 4].map((amount) => [amount, shiftWord(sourceText, amount)])
      ];
    }

    function newQuestion() {
      activeMode = "quiz";
      updateModeButtons();
      round += 1;
      answer = pickWord();
      answered = false;
      roundLabel.textContent = `問題 ${round}`;
      lengthBadge.textContent = `${Array.from(answer).length}文字`;
      message.textContent = "ずらされる前の言葉を想像してから、答えを表示してください。";
      answerButton.disabled = false;
      nextButton.disabled = true;
      customPanel.hidden = true;
      answerButton.hidden = false;
      nextButton.hidden = false;
      copyButton.hidden = false;
      renderShiftRows(answer, hiddenWord(answer));
    }

    function revealAnswer() {
      message.innerHTML = `<span>答えは </span><strong>${answer}</strong><span> です。</span>`;
      answerButton.disabled = true;
      nextButton.disabled = false;
      answered = true;
      renderShiftRows(answer, answer);
    }

    function updateModeButtons() {
      modeButtons.forEach((button) => {
        button.setAttribute("aria-pressed", String(button.dataset.mode === activeMode));
      });
    }

    function renderCustomMode() {
      const sourceText = customInput.value || " ";
      const centerText = customAnswerHidden ? hiddenWord(sourceText) : sourceText;
      roundLabel.textContent = "入力モード";
      lengthBadge.textContent = `${Array.from(sourceText.trim()).length}文字`;
      message.textContent = customAnswerHidden
        ? "中央の答えを隠しています。このままオリジナル問題として出せます。"
        : "入力した文字列を、文字コードでずらして表示しています。";
      customStatus.textContent = customAnswerHidden ? "中央の答えを非表示中" : "中央の答えを表示中";
      customHideButton.textContent = customAnswerHidden ? "答えを表示" : "答えを隠す";
      customHideButton.setAttribute("aria-pressed", String(customAnswerHidden));
      customPanel.hidden = false;
      answerButton.hidden = true;
      nextButton.hidden = true;
      copyButton.hidden = false;
      renderShiftRows(sourceText, centerText);
    }

    function switchMode(mode) {
      activeMode = mode;
      updateModeButtons();
      if (activeMode === "quiz") {
        customPanel.hidden = true;
        answerButton.hidden = false;
        nextButton.hidden = false;
        copyButton.hidden = false;
        if (!answer) {
          newQuestion();
          return;
        }
        roundLabel.textContent = `問題 ${round}`;
        lengthBadge.textContent = `${Array.from(answer).length}文字`;
        if (answered) {
          message.innerHTML = `<span>答えは </span><strong>${answer}</strong><span> です。</span>`;
        } else {
          message.textContent = "ずらされる前の言葉を想像してから、答えを表示してください。";
        }
        answerButton.disabled = answered;
        nextButton.disabled = !answered;
        renderShiftRows(answer, answered ? answer : hiddenWord(answer));
        return;
      }
      renderCustomMode();
      customInput.focus();
    }

    function rowLabel(amount) {
      return amount > 0 ? `+${amount}` : amount < 0 ? String(amount) : "???";
    }

    function puzzleText() {
      return currentRows.map(([amount, word]) => `${rowLabel(amount)} ${word}`).join("\n");
    }

    async function copyPuzzleText() {
      const text = puzzleText();
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
      } else {
        const helper = document.createElement("textarea");
        helper.value = text;
        helper.setAttribute("readonly", "");
        helper.style.position = "fixed";
        helper.style.left = "-9999px";
        document.body.append(helper);
        helper.select();
        document.execCommand("copy");
        helper.remove();
      }
      const previousText = copyButton.textContent;
      copyButton.textContent = "コピーしました";
      window.setTimeout(() => {
        copyButton.textContent = previousText;
      }, 1300);
    }

    modeButtons.forEach((button) => {
      button.addEventListener("click", () => switchMode(button.dataset.mode));
    });

    customInput.addEventListener("input", renderCustomMode);
    customHideButton.addEventListener("click", () => {
      customAnswerHidden = !customAnswerHidden;
      renderCustomMode();
    });
    answerButton.addEventListener("click", revealAnswer);
    nextButton.addEventListener("click", newQuestion);
    copyButton.addEventListener("click", () => {
      copyPuzzleText().catch(() => {
        message.textContent = "コピーできませんでした。ブラウザのクリップボード権限を確認してください。";
      });
    });

    newQuestion();
  </script>
</body>
