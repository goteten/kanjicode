<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Unicode Word Shift</title>
  <style>
    :root {
      color-scheme: light;
      --paper: #fbfaf6;
      --ink: #1d2630;
      --muted: #657385;
      --line: #d8d6ca;
      --mint: #69d2c0;
      --coral: #ef8b75;
      --yellow: #f2c94c;
      --blue: #405b8f;
      --white: #ffffff;
      --shadow: 0 18px 55px rgba(31, 45, 61, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      background:
        linear-gradient(135deg, rgba(105, 210, 192, 0.26), transparent 34%),
        linear-gradient(315deg, rgba(239, 139, 117, 0.19), transparent 38%),
        var(--paper);
      color: var(--ink);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(1040px, 100%);
      display: grid;
      gap: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.1rem, 6vw, 4.8rem);
      line-height: 0.96;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 1rem;
    }

    .game {
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: clamp(18px, 4vw, 34px);
      display: grid;
      gap: 20px;
    }

    [hidden] {
      display: none !important;
    }

    .mode-tabs {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .mode-button {
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--white);
      color: var(--ink);
      font: inherit;
      font-weight: 850;
      cursor: pointer;
    }

    .mode-button[aria-pressed="true"] {
      background: var(--ink);
      border-color: var(--ink);
      color: var(--white);
    }

    .question-top {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
    }

    .round-label {
      color: var(--muted);
      font-weight: 800;
      font-size: 0.95rem;
    }

    .length-badge {
      justify-self: end;
      min-height: 34px;
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff7dd;
      padding: 6px 10px;
      color: var(--ink);
      font-weight: 850;
      white-space: nowrap;
    }

    .custom-panel {
      display: grid;
      gap: 8px;
    }

    .custom-label {
      color: var(--muted);
      font-weight: 800;
      font-size: 0.95rem;
    }

    textarea {
      width: 100%;
      min-height: 94px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--white);
      color: var(--ink);
      padding: 12px;
      font: inherit;
      font-size: 1.15rem;
      line-height: 1.45;
    }

    textarea:focus {
      outline: 3px solid rgba(105, 210, 192, 0.42);
      outline-offset: 2px;
    }

    .shift-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .shift-card {
      min-height: 112px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--white);
      padding: 12px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 10px;
      overflow: hidden;
    }

    .shift-card.negative {
      border-top: 4px solid var(--mint);
    }

    .shift-card.positive {
      border-top: 4px solid var(--coral);
    }

    .shift-label {
      color: var(--muted);
      font-family: Consolas, "Courier New", monospace;
      font-weight: 800;
      font-size: 0.9rem;
    }

    .shift-word {
      display: grid;
      align-items: center;
      min-width: 0;
      overflow-wrap: anywhere;
      word-break: break-all;
      font-size: clamp(1.55rem, 4vw, 2.6rem);
      line-height: 1.08;
      font-weight: 900;
    }

    .answer-panel {
      min-height: 72px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f7fbff;
      display: grid;
      align-items: center;
      padding: 14px;
    }

    .answer-text {
      margin: 0;
      color: var(--muted);
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .answer-text strong {
      color: var(--ink);
      font-size: clamp(1.45rem, 4vw, 2.4rem);
      line-height: 1.12;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      align-items: center;
    }

    button.action {
      min-height: 52px;
      border: 0;
      border-radius: 8px;
      padding: 0 16px;
      font: inherit;
      font-weight: 850;
      cursor: pointer;
      white-space: nowrap;
    }

    button.primary {
      background: var(--coral);
      color: var(--white);
    }

    button.secondary {
      background: var(--ink);
      color: var(--white);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.42;
    }

    .note {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px;
      align-items: start;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .chip {
      display: inline-grid;
      place-items: center;
      min-width: 30px;
      height: 30px;
      border-radius: 8px;
      background: var(--yellow);
      color: var(--ink);
      font-weight: 900;
      font-family: Consolas, "Courier New", monospace;
    }

    @media (max-width: 860px) {
      .shift-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 620px) {
      body {
        padding: 14px;
      }

      .question-top,
      .controls,
      .mode-tabs,
      .shift-grid {
        grid-template-columns: 1fr;
      }

      .length-badge {
        justify-self: start;
      }

      button.action {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Unicode Word Shift</h1>
      <p class="subtitle">文字コードを少しずつずらした言葉から、元の単語を当てるゲームです。</p>
    </header>

    <section class="game" aria-label="Unicode文字コードずらし単語クイズ">
      <div class="mode-tabs" aria-label="出題モード">
        <button class="mode-button" type="button" data-mode="quiz" aria-pressed="true">問題モード</button>
        <button class="mode-button" type="button" data-mode="custom" aria-pressed="false">入力モード</button>
      </div>

      <div class="question-top">
        <div class="round-label" id="roundLabel">問題 1</div>
        <div class="length-badge" id="lengthBadge">3文字</div>
      </div>

      <div class="custom-panel" id="customPanel" hidden>
        <label class="custom-label" for="customInput">ずらして表示する文字列</label>
        <textarea id="customInput" maxlength="40" spellcheck="false">漢字迷宮</textarea>
      </div>

      <div class="shift-grid" id="shiftGrid" aria-label="文字コードをずらした単語一覧"></div>

      <div class="answer-panel" aria-live="polite">
        <p class="answer-text" id="message">ずらされる前の言葉を想像してから、答えを表示してください。</p>
      </div>

      <div class="controls">
        <button class="action primary" type="button" id="answerButton">答えを表示</button>
        <button class="action secondary" type="button" id="nextButton" disabled>次の問題</button>
      </div>

      <div class="note">
        <span class="chip">+1</span>
        <span>各文字のUnicodeコードポイントを同じ数だけ動かしています。たとえば答えが bee なら、-1 で add、+1 で cff になります。</span>
      </div>
    </section>
  </main>

  <script>

      "稲妻", "雷鳴", "夕立", "狐雨", "霧雨", "五月雨", "村雨", "白南風", "木枯らし", "野分",
      "暦日", "朔日", "望月", "三日月", "十六夜", "有明月", "流星群", "北斗星", "銀河系", "天球儀",
      "惑星", "衛星", "彗星", "恒星", "星雲", "太陽暦", "日時計", "砂金", "鉱脈", "溶岩",

      "墨汁", "金箔", "銀細工", "螺鈿", "漆器", "陶磁器", "青磁", "白磁", "染付", "唐草",

      "茗荷", "紫蘇", "蓮根", "牛蒡", "大根役者", "豆腐屋", "醤油蔵", "味噌蔵", "酒蔵", "麹室",
      "盆踊り", "神輿", "山車", "縁日", "射的", "金魚鉢", "風鈴", "線香花火", "打上花火", "提灯行列",
      "初詣", "書初め", "七草粥", "節分", "雛祭り", "花見酒", "端午", "七夕", "月見団子", "除夜鐘",
      "忍者屋敷", "城下町", "本丸", "天守閣", "堀割", "石垣", "武家屋敷", "茶屋町", "問屋街", "宿場町",
      "路地裏", "横丁", "石段", "古井戸", "井戸端", "辻占", "高札場", "番傘", "雨合羽", "旅籠",
      "龍笛", "琵琶", "三味線", "琴柱", "尺八", "拍子木", "木魚", "銅鑼", "鼓笛隊", "雅楽",
      "能面", "歌舞伎", "見得", "花道", "寄席", "落語", "講談", "紙芝居", "狂言", "人形浄瑠璃",
      "朱雀門", "玄武岩", "青龍刀", "白虎隊", "麒麟児", "鳳凰堂", "龍宮城", "蓬莱山", "桃源郷", "極楽鳥",
      "影法師", "狐火", "鬼灯", "夜光虫", "夢見鳥", "鵺", "河童巻き", "天狗面", "座敷牢", "迷子札",
      "コンビニ", "カステラ", "ラーメン", "チョコレート", "サンドイッチ", "エレベーター", "パスポート", "キーボード", "アルバム", "バスケット",
      "オルゴール", "カレンダー", "スニーカー", "トンネル", "ハンカチ", "ピアノ", "マラソン", "メロディ", "ロケット", "カプセル",
      "penguin", "notebook", "sunflower", "keyboard", "triangle", "umbrella", "calendar", "sandwich", "harmony", "library",
      "festival", "diamond", "morning", "evening", "rainbow", "station", "picture", "battery", "journey", "whisper",
      "mirror", "garden", "rocket", "planet", "puzzle", "cookie", "orange", "violet", "silver", "button"
    ];

    const shifts = [-4, -3, -2, -1, 1, 2, 3, 4];
    const quizWords = words.filter((word) => {
      const length = Array.from(word).length;
      return length >= 3 && length <= 20;
    });
    const shiftGrid = document.querySelector("#shiftGrid");
    const roundLabel = document.querySelector("#roundLabel");
    const lengthBadge = document.querySelector("#lengthBadge");
    const customPanel = document.querySelector("#customPanel");
    const customInput = document.querySelector("#customInput");
    const message = document.querySelector("#message");
    const answerButton = document.querySelector("#answerButton");
    const nextButton = document.querySelector("#nextButton");
    const modeButtons = document.querySelectorAll(".mode-button");

    let activeMode = "quiz";
    let round = 0;
    let answer = "";
    let previousAnswer = "";

    function pickWord() {
      let picked = quizWords[Math.floor(Math.random() * quizWords.length)];
      while (quizWords.length > 1 && picked === previousAnswer) {
        picked = quizWords[Math.floor(Math.random() * quizWords.length)];
      }
      previousAnswer = picked;
      return picked;
    }

    function shiftWord(word, amount) {
      return Array.from(word, (char) => {
        const shifted = char.codePointAt(0) + amount;
        return String.fromCodePoint(Math.max(1, shifted));
      }).join("");
    }

    function renderShiftCards(sourceText) {
      shiftGrid.replaceChildren();
      shifts.forEach((amount) => {
        const card = document.createElement("article");
        card.className = `shift-card ${amount < 0 ? "negative" : "positive"}`;

        const label = document.createElement("div");
        label.className = "shift-label";
        label.textContent = amount > 0 ? `+${amount}` : String(amount);

        const word = document.createElement("div");
        word.className = "shift-word";
        word.textContent = shiftWord(sourceText, amount);

        card.append(label, word);
        shiftGrid.append(card);
      });
    }

    function newQuestion() {
      activeMode = "quiz";
      updateModeButtons();
      round += 1;
      answer = pickWord();
      roundLabel.textContent = `問題 ${round}`;
      lengthBadge.textContent = `${Array.from(answer).length}文字`;
      message.textContent = "ずらされる前の言葉を想像してから、答えを表示してください。";
      answerButton.disabled = false;
      nextButton.disabled = true;
      customPanel.hidden = true;
      answerButton.hidden = false;
      nextButton.hidden = false;
      renderShiftCards(answer);
    }

    function revealAnswer() {
      message.innerHTML = `<span>答えは </span><strong>${answer}</strong><span> です。</span>`;
      answerButton.disabled = true;
      nextButton.disabled = false;
    }

    function updateModeButtons() {
      modeButtons.forEach((button) => {
        button.setAttribute("aria-pressed", String(button.dataset.mode === activeMode));
      });
    }

    function renderCustomMode() {
      const sourceText = customInput.value || " ";
      roundLabel.textContent = "入力モード";
      lengthBadge.textContent = `${Array.from(sourceText.trim()).length}文字`;
      message.textContent = "入力した文字列を、文字コードでずらして表示しています。";
      customPanel.hidden = false;
      answerButton.hidden = true;
      nextButton.hidden = true;
      renderShiftCards(sourceText);
    }

    function switchMode(mode) {
      activeMode = mode;
      updateModeButtons();
      if (activeMode === "quiz") {
        customPanel.hidden = true;
        answerButton.hidden = false;
        nextButton.hidden = false;
        if (!answer) {
          newQuestion();
          return;
        }
        roundLabel.textContent = `問題 ${round}`;
        lengthBadge.textContent = `${Array.from(answer).length}文字`;
        message.textContent = "ずらされる前の言葉を想像してから、答えを表示してください。";
        answerButton.disabled = false;
        nextButton.disabled = true;
        renderShiftCards(answer);
        return;
      }
      renderCustomMode();
      customInput.focus();
    }

    modeButtons.forEach((button) => {
      button.addEventListener("click", () => switchMode(button.dataset.mode));
    });

    customInput.addEventListener("input", renderCustomMode);
    answerButton.addEventListener("click", revealAnswer);
    nextButton.addEventListener("click", newQuestion);

    newQuestion();
  </script>
</body>
</html>
