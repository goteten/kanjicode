<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kanji Drift</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f7f4ea;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 18%, rgba(105, 210, 192, 0.2), transparent 30%),
        radial-gradient(circle at 78% 24%, rgba(239, 139, 117, 0.18), transparent 30%),
        radial-gradient(circle at 54% 84%, rgba(242, 201, 76, 0.12), transparent 34%),
        linear-gradient(140deg, #101312, #1d2420 50%, #11171c);
      color: var(--ink);
    }

    .stage {
      position: fixed;
      inset: 0;
      overflow: hidden;
      user-select: none;
    }

    .kanji {
      position: absolute;
      left: 0;
      top: 0;
      width: 1em;
      height: 1em;
      display: grid;
      place-items: center;
      font-family: "Yu Mincho", "Hiragino Mincho ProN", "MS Mincho", serif;
      font-weight: 800;
      line-height: 1;
      text-shadow: 0 10px 28px rgba(0, 0, 0, 0.38);
      will-change: transform;
      filter: saturate(1.08);
    }
  </style>
</head>
<body>
  <main class="stage" id="stage" aria-label="moving kanji"></main>

  <script src="kanji-data.js"></script>
  <script>
    const stage = document.querySelector("#stage");
    const palette = ["#f7f4ea", "#f2c94c", "#69d2c0", "#ef8b75", "#cfd7ff", "#b7f7dc"];
    const source = Array.from(new Set(Array.from(JOYO_KANJI + JIS_LEVEL_1_KANJI + JIS_LEVEL_2_KANJI)));
    const glyphs = [];
    let width = window.innerWidth;
    let height = window.innerHeight;
    let lastTime = performance.now();

    function random(min, max) {
      return min + Math.random() * (max - min);
    }

    function pick(list) {
      return list[Math.floor(Math.random() * list.length)];
    }

    function glyphCount() {
      const area = width * height;
      return Math.max(80, Math.min(240, Math.floor(area / 5200)));
    }

    function createGlyph() {
      const el = document.createElement("span");
      const size = random(20, 76);
      el.className = "kanji";
      el.textContent = pick(source);
      el.style.fontSize = `${size}px`;
      el.style.color = pick(palette);
      el.style.opacity = random(0.34, 0.9).toFixed(2);
      stage.appendChild(el);

      return {
        el,
        size,
        x: random(0, Math.max(1, width - size)),
        y: random(0, Math.max(1, height - size)),
        vx: random(-44, 44) || 24,
        vy: random(-44, 44) || -24,
        spin: random(-12, 12),
        angle: random(-18, 18)
      };
    }

    function rebuildGlyphs() {
      glyphs.forEach((glyph) => glyph.el.remove());
      glyphs.length = 0;
      const count = glyphCount();
      for (let index = 0; index < count; index += 1) {
        glyphs.push(createGlyph());
      }
    }

    function moveGlyph(glyph, delta) {
      glyph.x += glyph.vx * delta;
      glyph.y += glyph.vy * delta;
      glyph.angle += glyph.spin * delta;

      if (glyph.x <= 0 || glyph.x >= width - glyph.size) {
        glyph.vx *= -1;
        glyph.x = Math.max(0, Math.min(width - glyph.size, glyph.x));
      }

      if (glyph.y <= 0 || glyph.y >= height - glyph.size) {
        glyph.vy *= -1;
        glyph.y = Math.max(0, Math.min(height - glyph.size, glyph.y));
      }

      glyph.el.style.transform = `translate3d(${glyph.x}px, ${glyph.y}px, 0) rotate(${glyph.angle}deg)`;
    }

    function animate(now) {
      const delta = Math.min(0.04, (now - lastTime) / 1000);
      lastTime = now;
      glyphs.forEach((glyph) => moveGlyph(glyph, delta));
      requestAnimationFrame(animate);
    }

    window.addEventListener("resize", () => {
      width = window.innerWidth;
      height = window.innerHeight;
      rebuildGlyphs();
    });

    rebuildGlyphs();
    requestAnimationFrame(animate);
  </script>
</body>
</html>
