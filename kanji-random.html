<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>漢字ランダムウォーク</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101312;
      --ink: #f7f4ea;
      --muted: #b9b5a8;
      --panel: rgba(16, 19, 18, 0.72);
      --line: rgba(247, 244, 234, 0.2);
      --accent: #f2c94c;
      --accent-2: #69d2c0;
      --accent-3: #ef8b75;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      overflow: hidden;
    }

    body {
      font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      background:
        radial-gradient(circle at 18% 16%, rgba(105, 210, 192, 0.22), transparent 28%),
        radial-gradient(circle at 82% 22%, rgba(239, 139, 117, 0.2), transparent 28%),
        linear-gradient(140deg, #101312, #1d2420 50%, #11171c);
      color: var(--ink);
    }

    .stage {
      position: fixed;
      inset: 0;
      overflow: hidden;
      cursor: crosshair;
      user-select: none;
      touch-action: manipulation;
    }

    .kanji {
      position: absolute;
      left: 0;
      top: 0;
      width: 1em;
      height: 1em;
      display: grid;
      place-items: center;
      font-family: "Yu Mincho", "Hiragino Mincho ProN", "MS Mincho", serif;
      font-weight: 800;
      line-height: 1;
      text-shadow: 0 10px 28px rgba(0, 0, 0, 0.38);
      will-change: transform;
      filter: saturate(1.08);
    }

    .hud {
      position: fixed;
      left: clamp(14px, 3vw, 34px);
      right: clamp(14px, 3vw, 34px);
      top: clamp(14px, 3vw, 30px);
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      pointer-events: none;
    }

    .title-block {
      max-width: min(580px, 72vw);
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      backdrop-filter: blur(14px);
      box-shadow: 0 16px 50px rgba(0, 0, 0, 0.26);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.35rem, 4vw, 3.2rem);
      line-height: 1;
      letter-spacing: 0;
    }

    p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: clamp(0.82rem, 2vw, 0.98rem);
      line-height: 1.5;
    }

    .controls {
      display: flex;
      gap: 8px;
      pointer-events: auto;
    }

    button,
    a {
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 13px;
      display: inline-grid;
      place-items: center;
      background: rgba(247, 244, 234, 0.1);
      color: var(--ink);
      font: inherit;
      font-weight: 800;
      text-decoration: none;
      cursor: pointer;
      white-space: nowrap;
    }

    button:hover,
    a:hover {
      background: rgba(247, 244, 234, 0.18);
    }

    .counter {
      position: fixed;
      right: clamp(14px, 3vw, 34px);
      bottom: clamp(14px, 3vw, 30px);
      z-index: 2;
      min-width: 142px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--muted);
      font-size: 0.86rem;
      text-align: right;
      backdrop-filter: blur(14px);
    }

    @media (max-width: 720px) {
      .hud {
        align-items: stretch;
        flex-direction: column;
      }

      .title-block {
        max-width: none;
      }

      .controls {
        width: 100%;
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
      }

      button,
      a {
        min-width: 0;
        padding: 0 8px;
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <main class="stage" id="stage" aria-label="ランダムに動き回る漢字">
    <div class="hud">
      <section class="title-block">
        <h1>漢字ランダムウォーク</h1>
        <p>画面をクリックすると散らばります。スペースキーで一時停止できます。</p>
      </section>
      <nav class="controls" aria-label="操作">
        <button type="button" id="shuffleButton">散らばる</button>
        <button type="button" id="pauseButton">停止</button>
        <a href="index.html">戻る</a>
      </nav>
    </div>
    <div class="counter" id="counter">0字が移動中</div>
  </main>

  <script src="kanji-data.js"></script>
  <script>
    const stage = document.querySelector("#stage");
    const counter = document.querySelector("#counter");
    const pauseButton = document.querySelector("#pauseButton");
    const shuffleButton = document.querySelector("#shuffleButton");

    const palette = ["#f7f4ea", "#f2c94c", "#69d2c0", "#ef8b75", "#cfd7ff"];
    const source = Array.from(new Set(Array.from(JOYO_KANJI + JIS_LEVEL_1_KANJI)));
    const glyphs = [];
    let running = true;
    let width = window.innerWidth;
    let height = window.innerHeight;
    let lastTime = performance.now();

    function random(min, max) {
      return min + Math.random() * (max - min);
    }

    function pick(list) {
      return list[Math.floor(Math.random() * list.length)];
    }

    function glyphCount() {
      const area = width * height;
      return Math.max(26, Math.min(88, Math.floor(area / 15000)));
    }

    function createGlyph() {
      const el = document.createElement("span");
      const size = random(30, 96);
      el.className = "kanji";
      el.textContent = pick(source);
      el.style.fontSize = `${size}px`;
      el.style.color = pick(palette);
      el.style.opacity = random(0.42, 0.92).toFixed(2);
      stage.appendChild(el);

      return {
        el,
        size,
        x: random(0, Math.max(1, width - size)),
        y: random(0, Math.max(1, height - size)),
        vx: random(-58, 58) || 34,
        vy: random(-58, 58) || -34,
        spin: random(-18, 18),
        angle: random(-16, 16)
      };
    }

    function rebuildGlyphs() {
      glyphs.forEach((glyph) => glyph.el.remove());
      glyphs.length = 0;
      const count = glyphCount();
      for (let index = 0; index < count; index += 1) {
        glyphs.push(createGlyph());
      }
      counter.textContent = `${count}字が移動中`;
    }

    function shuffleGlyphs() {
      glyphs.forEach((glyph) => {
        glyph.el.textContent = pick(source);
        glyph.el.style.color = pick(palette);
        glyph.x = random(0, Math.max(1, width - glyph.size));
        glyph.y = random(0, Math.max(1, height - glyph.size));
        glyph.vx = random(-150, 150) || 90;
        glyph.vy = random(-150, 150) || -90;
      });
    }

    function moveGlyph(glyph, delta) {
      glyph.x += glyph.vx * delta;
      glyph.y += glyph.vy * delta;
      glyph.angle += glyph.spin * delta;

      if (glyph.x <= 0 || glyph.x >= width - glyph.size) {
        glyph.vx *= -1;
        glyph.x = Math.max(0, Math.min(width - glyph.size, glyph.x));
      }

      if (glyph.y <= 0 || glyph.y >= height - glyph.size) {
        glyph.vy *= -1;
        glyph.y = Math.max(0, Math.min(height - glyph.size, glyph.y));
      }

      glyph.el.style.transform = `translate3d(${glyph.x}px, ${glyph.y}px, 0) rotate(${glyph.angle}deg)`;
    }

    function animate(now) {
      const delta = Math.min(0.04, (now - lastTime) / 1000);
      lastTime = now;

      if (running) {
        glyphs.forEach((glyph) => moveGlyph(glyph, delta));
      }

      requestAnimationFrame(animate);
    }

    function togglePause() {
      running = !running;
      pauseButton.textContent = running ? "停止" : "再開";
    }

    window.addEventListener("resize", () => {
      width = window.innerWidth;
      height = window.innerHeight;
      rebuildGlyphs();
    });

    window.addEventListener("keydown", (event) => {
      if (event.code === "Space") {
        event.preventDefault();
        togglePause();
      }
    });

    stage.addEventListener("click", (event) => {
      if (event.target.closest("button, a")) {
        return;
      }
      shuffleGlyphs();
    });

    pauseButton.addEventListener("click", togglePause);
    shuffleButton.addEventListener("click", shuffleGlyphs);

    rebuildGlyphs();
    requestAnimationFrame(animate);
  </script>
</body>
</html>
